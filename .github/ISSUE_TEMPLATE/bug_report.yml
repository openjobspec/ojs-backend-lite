name: Bug Report
description: Report a bug in ojs-backend-lite
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the information below.

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of ojs-backend-lite are you using?
      placeholder: e.g., v0.1.0
    validations:
      required: true

  - type: dropdown
    id: transport
    attributes:
      label: Transport
      description: Which transport are you using?
      options:
        - HTTP
        - gRPC
        - Both
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Start server with `make run`
        2. Send POST to /ojs/v1/jobs with body...
        3. See error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Any relevant environment details.
      placeholder: |
        - OS: macOS 15.2
        - Go: 1.24
        - Persistence: SQLite / in-memory
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output.
      render: shell
    validations:
      required: false
